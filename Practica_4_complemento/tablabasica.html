<html>

</head>
<body>
<h1>Tablas en HTML</h1>
<p>A continuación, un ejemplo de Tabla</p>
<table>

<thead>
    <!--Encabezado de tabla-->
    <th>encabezado columna1</th>    
    <th>encabezado columna2</th>

</thead >

    <!--renglon1-->

        <!--Encabezado de tabla-->
        <td>dato1</td>
        <td>dato2</td>
        <td>dato3</td>
    </tr>
    <!--renglon2-->
    <tr>
        <td>dato4</td>

        <td>dato6</td>
        </tr>
</tbody>

</tfoot>
</table>
</body>
</html>
